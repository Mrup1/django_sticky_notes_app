{% extends 'base.html' %}

{% block title %}Delete Note - StickyNotes{% endblock %}

{% block content %}
<div class="glass-card" style="max-width: 450px; text-align:center;">
    <div style="font-size: 3rem; margin-bottom: 1rem;">🗑️</div>
    <h2 style="margin-bottom:1rem;">Delete Sticky Note?</h2>
    <p style="color:#94a3b8; margin-bottom: 2rem;">
        Are you sure you want to delete "<strong>{{ note.title }}</strong>"? This action cannot be undone.
    </p>
    
    <form method="post" style="display:flex; gap: 1rem; justify-content:center;">
        {% csrf_token %}
        <a href="{% url 'note_list' %}" class="btn-primary" style="background-color: transparent; border: 1px solid var(--card-border); color: white;">Cancel</a>
        <button type="submit" class="btn-primary btn-danger">Yes, Delete It</button>
    </form>
</div>
{% endblock %}
